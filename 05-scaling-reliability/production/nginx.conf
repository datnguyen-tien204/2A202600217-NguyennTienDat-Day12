# ============================================================
# Nginx — Load Balancer cho Scaling Demo
#
# OPTIMIZATIONS:
#   - Thêm least_conn load balancing (tốt hơn round-robin cho LLM requests vì latency không đều)
#   - Thêm gzip compression
#   - Tăng worker_processes = auto
#   - JSON access log format
#   - Thêm upstream health check passive
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_types application/json text/plain;
    gzip_min_length 512;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s;

    # OPTIMIZATION: least_conn thay vì round-robin
    # LLM requests có latency không đều → least_conn phân phối tốt hơn
    upstream agent_cluster {
        least_conn;
        server agent:8000;
        keepalive 16;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # JSON logging để dễ parse
    log_format json_log escape=json
        '{"time":"$time_iso8601","method":"$request_method",'
        '"path":"$request_uri","status":$status,'
        '"ms":$request_time,"upstream":"$upstream_addr"}';

    server {
        listen 80;

        # Add instance header để thấy rõ load balancing
        add_header X-Served-By $upstream_addr always;
        add_header X-Content-Type-Options "nosniff" always;

        access_log /var/log/nginx/access.log json_log;
        error_log  /var/log/nginx/error.log warn;

        location / {
            proxy_pass              http://agent_cluster;
            proxy_http_version      1.1;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        Connection      "";

            proxy_connect_timeout   5s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;

            # Passive health: skip instance nếu trả lỗi 502/503
            proxy_next_upstream         error timeout http_502 http_503;
            proxy_next_upstream_tries   3;
            proxy_next_upstream_timeout 10s;
        }

        location ~ ^/(health|ready)$ {
            proxy_pass          http://agent_cluster;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            access_log          off;
        }
    }
}
