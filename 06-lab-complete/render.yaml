services:
  - type: web
    name: vinmecprep-ai
    env: python
    plan: free
    buildCommand: cd 06-lab-complete && pip install -r requirements.txt
    startCommand: cd 06-lab-complete && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinmecprep-redis
          property: connectionString
      - key: AGENT_API_KEY
        generateValue: true
      - key: TRAINER_API_KEY
        generateValue: true
      - key: LLM_API_KEY
        generateValue: true

  - type: redis
    name: vinmecprep-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru