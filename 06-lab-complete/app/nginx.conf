events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    # Docker embedded DNS resolver for dynamic service-name resolution.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zone (tầng nginx, ngoài Redis rate limit của API)
    limit_req_zone $binary_remote_addr zone=chat_zone:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=health_zone:1m rate=60r/m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;
        set $api_upstream http://api:8000;

        # ── Protected write endpoints ────────────────────────────────────────
        location = /chat {
            limit_req zone=chat_zone burst=10 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
        }

        location = /chat/async {
            limit_req zone=chat_zone burst=10 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
        }

        location /feedback {
            limit_req zone=chat_zone burst=10 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
        }

        # ── Read-only and ops endpoints ──────────────────────────────────────
        location / {
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_hide_header  Server;
            proxy_hide_header  X-Powered-By;
        }

        # ── Health check (bypass rate limit) ────────────────────────────────
        location /health {
            limit_req zone=health_zone burst=5;
            proxy_pass $api_upstream;
            access_log off;
        }

        # ── Block các path nhạy cảm ─────────────────────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
