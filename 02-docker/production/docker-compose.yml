# ============================================================
# Docker Compose — Full Agent Stack
#
# Services:
#   1. agent    — FastAPI AI agent
#   2. redis    — Cache cho session và rate limiting
#   3. qdrant   — Vector database cho RAG
#   4. nginx    — Reverse proxy, load balancer
#
# OPTIMIZATIONS:
#   - Bỏ `version:` field (deprecated trong Compose v2+)
#   - Thêm resource limits để tránh OOM
#   - Thêm logging config để tránh disk đầy
#   - Dùng named network với external=false rõ ràng
#   - Thêm depends_on condition cho agent → nginx
#
# Chạy: docker compose up
# Test:  curl http://localhost/health
# Stop:  docker compose down
# ============================================================

services:

  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: ../..  # project root
      dockerfile: 02-docker/production/Dockerfile
      target: runtime  # chỉ build stage "runtime", skip "builder"
    environment:
      - ENVIRONMENT=staging
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      # ❌ KHÔNG đặt secrets trực tiếp ở đây trong production
      # ✅ Dùng: docker secret hoặc env file ngoài git
    env_file:
      - .env.local  # secrets riêng, trong .gitignore
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=8)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # OPTIMIZATION: Resource limits để tránh OOM kill cả host
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    # OPTIMIZATION: Giới hạn log size tránh disk đầy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Không expose port trực tiếp — dùng qua Nginx
    networks:
      - internal

  # ──────────────────────────────────────
  # Redis — Session cache & Rate limiting
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - internal

  # ──────────────────────────────────────
  # Qdrant — Vector database
  # ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx — Reverse proxy & Load balancer
  # ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS (cần cert)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

# ──────────────────────────────────────
# Volumes — persistent data
# ──────────────────────────────────────
volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local

# ──────────────────────────────────────
# Network — isolate internal traffic
# ──────────────────────────────────────
networks:
  internal:
    driver: bridge
