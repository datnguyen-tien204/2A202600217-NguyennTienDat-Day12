# ============================================================
# Nginx — Reverse Proxy & Load Balancer cho Agent Stack
#
# OPTIMIZATIONS:
#   - Thêm gzip compression để giảm bandwidth ~70%
#   - Thêm cache headers cho static responses
#   - Tăng worker_processes = auto (dùng tất cả CPU cores)
#   - Thêm keepalive connections để giảm overhead TCP handshake
#   - Tách /health và /ready khỏi rate limiting
#   - Thêm Content-Security-Policy header
# ============================================================

worker_processes auto;  # OPTIMIZATION: dùng tất cả CPU cores
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;       # OPTIMIZATION: tăng từ 1024 lên 4096
    use epoll;                     # Linux event model hiệu quả nhất
    multi_accept on;               # Chấp nhận nhiều connections cùng lúc
}

http {
    # ──────────────────────────────────────
    # Basic Settings
    # ──────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;   # Gửi headers + data trong 1 packet
    tcp_nodelay         on;
    keepalive_timeout   75s;
    types_hash_max_size 2048;
    server_tokens       off;  # Ẩn Nginx version

    # ──────────────────────────────────────
    # OPTIMIZATION: Gzip Compression
    # Giảm response size ~60-80% cho JSON/text
    # ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # ──────────────────────────────────────
    # Upstream: danh sách agent instances
    # ──────────────────────────────────────
    upstream agent_backend {
        server agent:8000;
        # Khi scale thêm instances:
        # server agent_2:8000;
        # server agent_3:8000;
        keepalive 32;            # Tái sử dụng connections (giảm overhead)
        keepalive_requests 100;  # Requests per keepalive connection
        keepalive_timeout  60s;
    }

    # Rate limiting: 10 requests/giây per IP
    # zone=10m → 10MB storage ≈ 160,000 unique IPs
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # ──────────────────────────────────────
    # OPTIMIZATION: Logging format JSON
    # Dễ parse trong log aggregators
    # ──────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"ip":"$remote_addr",'
        '"upstream":"$upstream_addr"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    server {
        listen 80;
        server_name _;

        # ──────────────────────────────────────
        # Security headers
        # ──────────────────────────────────────
        add_header X-Frame-Options            "DENY"                              always;
        add_header X-Content-Type-Options     "nosniff"                           always;
        add_header X-XSS-Protection           "1; mode=block"                    always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'" always;

        # ──────────────────────────────────────
        # Main API routes
        # ──────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy đến agent
            proxy_pass              http://agent_backend;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        Connection        "";  # Enable keepalive

            # Timeouts
            proxy_connect_timeout   5s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;   # LLM calls có thể chậm

            # OPTIMIZATION: Buffer settings
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           8 32k;
        }

        # Health/Ready checks — không cần rate limit, không log
        location ~ ^/(health|ready)$ {
            proxy_pass          http://agent_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            access_log          off;     # Không spam log với health checks
        }

        # Custom error pages
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too many requests","retry_after_seconds":1}';
        }

        error_page 502 503 504 @upstream_error;
        location @upstream_error {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable","retry_after_seconds":5}';
        }
    }
}
